<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRATE GRABBER • CRATE JUICE™️</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d97706">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .crate-bg { 
            background: linear-gradient(rgba(26,18,8,0.92), rgba(44,31,15,0.95)), 
                        url('https://raw.githubusercontent.com/jujubeans85/chlomim/refs/heads/main/grabber/HEIF%20Image.heic') center/cover no-repeat fixed; 
        }
        .header-graffiti { 
            font-size: 3.8rem; 
            font-weight: 900; 
            text-shadow: 8px 8px 0 #1a1208, -4px -4px 0 #f59e0b, 0 0 20px #22d3ee; 
            letter-spacing: -6px; 
            background: linear-gradient(90deg, #f59e0b, #22d3ee); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .tape { 
            background: #d97706; 
            color: #1a1208; 
            transform: rotate(-2deg); 
            box-shadow: 3px 3px 0 #1a1208; 
        }
        button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="crate-bg bg-zinc-950 text-white min-h-screen">
<div class="max-w-2xl mx-auto p-5 safe-area">
    <div class="flex justify-center mb-6">
        <div class="bg-white/90 text-[#1a1208] px-8 py-3 rounded-3xl shadow-2xl inline-block header-graffiti">THE STUDIO</div>
    </div>
    <p class="text-center text-orange-300 text-2xl -mt-4 mb-6">for CHLO &amp; MIMI with all of my love</p>
    <div class="flex justify-center mb-8">
        <div class="tape inline-block px-8 py-1 text-sm font-bold tracking-widest">NAVIGATION ISAK</div>
    </div>

    <div class="bg-amber-900/30 border-2 border-amber-700 rounded-3xl p-6 mb-8">
        <textarea id="urlInput" rows="6" placeholder="Paste multiple URLs here — one per line (YouTube, Spotify, SoundCloud...)" class="w-full bg-transparent text-white placeholder:text-amber-300 focus:outline-none resize-none text-base"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="quickCommand('mp3')" class="bg-amber-600 py-6 rounded-3xl font-medium text-lg">MP3</button>
        <button onclick="quickCommand('wav')" class="bg-amber-600 py-6 rounded-3xl font-medium text-lg">WAV</button>
        <button onclick="quickCommand('vid')" class="bg-amber-600 py-6 rounded-3xl font-medium text-lg">VID</button>
        <button onclick="quickCommand('vid+aud')" class="bg-amber-600 py-6 rounded-3xl font-medium text-lg">VID + AUD</button>
    </div>

    <button onclick="dropInTheCrate()" class="w-full py-6 bg-gradient-to-r from-amber-400 to-orange-500 text-amber-950 rounded-3xl font-bold text-2xl shadow-2xl flex items-center justify-center gap-3">🪕 DROP TO CRATE</button>

    <div id="commandBox" class="hidden mt-8 bg-black/70 border border-amber-700 rounded-3xl p-6">
        <pre id="commandText" class="text-emerald-300 text-sm whitespace-pre-wrap"></pre>
        <p id="aiPromptBox" class="mt-6 text-xs text-amber-300"></p>
    </div>

    <div class="mt-12 text-center text-xs text-amber-300">
        CRATE JUICE™ Since '23
    </div>
</div>

<script>
    function quickCommand(type) {
        const input = document.getElementById('urlInput').value.trim();
        if (!input) return alert("Paste at least one URL");
        let cmd = 'yt-dlp --concurrent-fragments 16 --retries infinite --embed-metadata --embed-thumbnail --embed-chapters ';
        let note = '';
        if (type === 'mp3') { cmd += '-x --audio-format mp3 --audio-quality 0 '; note = 'Professional MP3'; }
        else if (type === 'wav') { cmd += '-x --audio-format wav '; note = 'Lossless WAV'; }
        else if (type === 'vid') { cmd += '-f bestvideo '; note = 'Video only'; }
        else if (type === 'vid+aud') { cmd += ''; note = 'Video + Audio'; }
        cmd += `"${input}" --output "%(title)s.%(ext)s"`;
        document.getElementById('commandText').textContent = cmd;
        document.getElementById('aiPromptBox').innerHTML = `<strong>AI Batch Post-Processing Prompt (copy to any AI):</strong><br>Take these downloaded files and perform professional post-processing: ID3v2.4 tagging, frequency manipulation (EQ, compression, loudness normalization), beat matching, stem separation if needed, and any creative effects for DJ / Logic Pro use. Output tagged, ready-to-use files.`;
        document.getElementById('commandBox').classList.remove('hidden');
    }

    function dropInTheCrate() {
        const text = document.getElementById('commandText').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ Command copied!\n\nOpen A-Shell → long-press → Paste\n\nAI prompt is ready below for post-processing.");
        });
    }

    window.onload = () => {};
</script>
</body>
</html>
