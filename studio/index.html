<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE STUDIO • CRATE JUICE™</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#d97706">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');
        body {
            font-family: 'Architects Daughter', cursive;
            background: linear-gradient(rgba(139,69,19,0.85), rgba(160,82,45,0.9)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat fixed;
            filter: sepia(0.3) contrast(1.1);
        }
        .gear-bg { background: linear-gradient(rgba(26,18,8,0.92), rgba(44,31,15,0.95)), url('https://picsum.photos/id/1015/2000/1400') center/cover no-repeat fixed; filter: sepia(0.4) brightness(0.9); }
        .vintage-button {
            background: #d1d5db;
            color: #1f2937;
            box-shadow: 4px 4px 0 #374151, inset 0 2px 0 #f3f4f6;
            font-family: 'Architects Daughter', cursive;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vintage-button:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 #374151;
        }
        .vintage-button:active {
            transform: translateY(1px);
            box-shadow: 2px 2px 0 #374151;
        }
        .active-format {
            ring-4 ring-emerald-400 !important;
        }
        .txt-box {
            background: #9ca3af;
            border: 4px solid #4b5563;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .drop-crate {
            background: linear-gradient(90deg, #854d0e, #b45309);
            color: #fefce8;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
    </style>
</head>
<body class="gear-bg text-amber-950 min-h-screen flex flex-col">
    <div class="max-w-4xl mx-auto p-6 flex-1">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-block px-12 py-4 bg-[#d1d5db] border-4 border-[#4b5563] rounded-3xl shadow-2xl rotate-[-1deg] text-7xl tracking-[-4px] text-[#1f2937]" style="font-family: 'Architects Daughter', cursive;">THE STUDIO</div>
            <p class="text-2xl mt-3 text-amber-800 italic">for CHLO & MIMI with all of my love</p>
        </div>

        <!-- Txt Box -->
        <div class="txt-box rounded-3xl p-8 mb-8">
            <textarea id="urlInput" rows="3" class="w-full bg-transparent text-[#1f2937] placeholder:text-amber-700 text-2xl focus:outline-none resize-none" placeholder="Txt Box - Paste URL(s) one per line"></textarea>
        </div>

        <!-- Format Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="selectFormat(this, 'mp3')" class="vintage-button text-3xl py-8 rounded-3xl font-bold">MP3</button>
            <button onclick="selectFormat(this, 'wav')" id="wavBtn" class="vintage-button text-3xl py-8 rounded-3xl font-bold active-format">WAV <span class="text-emerald-600 text-4xl">✓</span></button>
            <button onclick="selectFormat(this, 'vid')" class="vintage-button text-3xl py-8 rounded-3xl font-bold">VID ONLY</button>
            <button onclick="selectFormat(this, 'vid+aud')" class="vintage-button text-3xl py-8 rounded-3xl font-bold">VID + AUD</button>
        </div>

        <!-- DROP TO CRATE -->
        <button onclick="dropToCrate()" class="drop-crate w-full py-8 rounded-3xl text-4xl font-black tracking-widest shadow-inner flex items-center justify-center gap-4 mb-12">
            <span class="text-5xl">🪕</span> DROP TO CRATE
        </button>

        <!-- A-SHELL COMMAND -->
        <div class="bg-[#1f2937] border-4 border-amber-800 rounded-3xl p-8 mb-8 text-emerald-300">
            <div class="flex justify-between items-center mb-4">
                <div class="uppercase tracking-widest text-xs font-bold text-amber-400">A-SHELL COMMAND</div>
                <button onclick="copyShell()" class="px-6 py-2 bg-amber-700 hover:bg-amber-600 text-white rounded-2xl text-sm">COPY</button>
            </div>
            <pre id="shellOutput" class="text-emerald-300 text-sm overflow-auto max-h-64 whitespace-pre-wrap font-mono leading-relaxed"># Professional yt-dlp script will appear here after DROP TO CRATE</pre>
        </div>

        <!-- Shazam -->
        <div class="bg-[#d1d5db] border-4 border-[#4b5563] rounded-3xl p-8">
            <label class="cursor-pointer flex items-center justify-center bg-amber-800 text-white px-8 py-4 rounded-3xl text-xl font-bold">UPLOAD SHAZAM CSV
                <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleShazamCSV(event)">
            </label>
        </div>

        <div class="text-center mt-12 text-xs opacity-70">
            CRATE JUICE™ Since ’23 • Built for iOS Music Production
        </div>
    </div>

    <script>
        let selectedFormat = 'wav';
        let selectedButton = null;

        function selectFormat(btn, fmt) {
            selectedFormat = fmt;
            if (selectedButton) selectedButton.classList.remove('active-format');
            btn.classList.add('active-format');
            selectedButton = btn;

            // Update WAV checkmark
            const wavBtn = document.getElementById('wavBtn');
            if (fmt === 'wav') {
                wavBtn.innerHTML = `WAV <span class="text-emerald-600 text-4xl">✓</span>`;
            } else if (wavBtn.innerHTML.includes('✓')) {
                wavBtn.innerHTML = 'WAV';
            }
        }

        function dropToCrate() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) {
                alert('Paste URL(s) in the Txt Box first');
                return;
            }

            let flags = '--concurrent-fragments 16 --retries infinite --embed-metadata --embed-thumbnail --embed-chapters --no-playlist ';

            if (selectedFormat === 'mp3') {
                flags += '-x --audio-format mp3 --audio-quality 0 ';
            } else if (selectedFormat === 'wav') {
                flags += '-x --audio-format wav ';
            } else if (selectedFormat === 'vid') {
                flags += '--format "bestvideo[ext=mp4]+bestaudio/best" ';
            } else if (selectedFormat === 'vid+aud') {
                flags += '--format "bestvideo+bestaudio/best" ';
            }

            const urls = input.split('\n').filter(u => u.trim());
            let fullScript = '#!/bin/bash\n# THE STUDIO - Professional Download Script for A-Shell\n\n' + 
                urls.map(url => `yt-dlp ${flags} "${url}" --output "~/Documents/%(title)s.%(ext)s"`).join('\n\n') + 
                '\n\necho "✅ Files dropped to ~/Documents/ - Open in Files app for Logic/DJ import"';

            document.getElementById('shellOutput').textContent = fullScript;
            navigator.clipboard.writeText(fullScript).then(() => {
                alert('✅ Script copied to clipboard! Paste into A-Shell and run.');
            });
        }

        function copyShell() {
            const text = document.getElementById('shellOutput').textContent;
            navigator.clipboard.writeText(text).then(() => alert('✅ Copied!'));
        }

        function handleShazamCSV(e) {
            // Same as before or improved
            alert('Shazam CSV upload ready (placeholder - full parser coming in next push if needed)');
        }

        window.onload = () => {
            console.log('%c✅ THE STUDIO v2 - Vintage analog live ' + new Date().toISOString(), 'color:#d97706; font-weight:bold');
            // Pre-select WAV
            const wavBtn = document.getElementById('wavBtn');
            selectFormat(wavBtn, 'wav');
        };
    </script>
</body>
</html>
