<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRATE GRABBER • CRATE JUICE™️</title>
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>

            background: linear-gradient(rgba(35,18,8,0.90), rgba(55,28,12,0.93)),

        }
        .header-graffiti { 
            font-size: 3.8rem; 
            font-weight: 900; 
            text-shadow: 8px 8px 0 #1a1208, -4px -4px 0 #f59e0b, 0 0 20px #22d3ee; 
            letter-spacing: -6px; 
            background: linear-gradient(90deg, #f59e0b, #22d3ee); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .tape { background: #d97706; color: #1a1208; transform: rotate(-2deg); box-shadow: 3px 3px 0 #1a1208; }
        .glass {
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass:active { transform: scale(0.96); }
    </style>
</head>
<body class="crate-bg bg-zinc-950 text-white min-h-screen">
<div class="max-w-2xl mx-auto p-5 safe-area">
    <div class="flex justify-center mb-6">
        <div class="bg-white/90 text-[#1a1208] px-8 py-3 rounded-3xl shadow-2xl inline-block header-graffiti">THE STUDIO</div>

    <p class="text-center text-orange-300 text-2xl -mt-4 mb-6">for CHLO &amp; MIMI with all of my love</p>
    <div class="flex justify-center mb-8">
        <div class="tape inline-block px-8 py-1 text-sm font-bold tracking-widest">NAVIGATION ISAK</div>

        <button onclick="quickCommand('vid')" class="glass py-6 rounded-3xl font-medium text-lg text-white">VID</button>

    </div>

        🪕 DROP TO CRATE
    </button>

    <button onclick="copyAShellSetup()"

    </button>

    <div id="commandBox" class="hidden mt-8 glass rounded-3xl p-6">
        <pre id="commandText" class="text-emerald-300 text-sm whitespace-pre-wrap"></pre>
        <p id="aiPromptBox" class="mt-6 text-xs text-amber-300"></p>
    </div>

    <div class="mt-12 text-center text-xs text-amber-300">
        CRATE JUICE™ Since '23
    </div>
</div>
