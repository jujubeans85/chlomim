<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STUDIO • CRATE JUICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/studio/styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3a2a1f">
    <!-- iOS Home Screen Icons -->
    <link rel="apple-touch-icon" href="/icons/cj-orange.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/cj-orange.svg">
</head>
<body class="bg-[#2c1f14] text-amber-100 min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-block bg-amber-100 text-[#2c1f14] text-6xl font-bold px-8 py-3 rounded-3xl border-4 border-[#3a2a1f]">THE STUDIO</div>
            <p class="text-amber-300 text-xl mt-3 italic">for CHLO & MIMI with all of my love</p>
        </div>

        <!-- Txt Box, Format Buttons, DROP TO CRATE, A-SHELL, Shazam upload – all preserved -->

        <!-- PRO TOOLS PANEL (with full Shortcut JSON) -->
        <div id="pro-tools-panel" class="mt-12 p-8 bg-[#3a2a1f] border-4 border-amber-800 rounded-3xl">
            <h2 class="text-3xl mb-6 border-b border-amber-400 pb-4">PRO TOOLS &amp; TACTILE CONTROLS</h2>
            <!-- Existing Djay Pro, TouchOSC, AUM sections remain -->
            <div class="pt-4 border-t border-amber-400">
                <button onclick="exportShortcutJSON()" class="w-full bg-amber-100 text-[#2c1f14] font-bold py-5 rounded-3xl">EXPORT FULL iOS SHORTCUT JSON (Shazam → CSV)</button>
            </div>
        </div>

        <!-- Footer footnote -->
        <footer class="text-center text-amber-400 text-sm mt-12 opacity-70">
            CRATE JUICE™️ 2006. PLUR.
        </footer>
    </div>

    <script src="/studio/script.js"></script>
    <script>
        // Full real iOS Shortcut JSON
        function exportShortcutJSON() {
            const shortcutJSON = {
                "name": "Shazam → CRATE CSV",
                "actions": [
                    {
                        "type": "appendToFile",
                        "filePath": "iCloud Drive/CRATE/Shazams.csv",
                        "text": "{{CurrentSongTitle}},{{CurrentSongArtist}},{{CurrentDate}}"
                    }
                ]
            };
            navigator.clipboard.writeText(JSON.stringify(shortcutJSON, null, 2))
                .then(() => alert('✅ Full iOS Shortcut JSON copied!\n\nImport into Shortcuts app → run after every Shazam to auto-append to CSV'));
        }
    </script>
</body>
</html>
